<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

<div id="startScreen">

<h1>Quiz instructions</h1>

<br>

<h2>This is a short multiple-choice quiz with questions about general knowledge</h2>

<br>

<h2>Press start to begin!</h2>

<button onclick="startQuiz()">Start</button>

</div>

<div id="quizScreen" style="display:none;">

    <h2 id="question"></h2>

    <button onclick="checkAnswer(0)" id="ans0"></button>

    <button onclick="checkAnswer(1)" id="ans1"></button>

    <button onclick="checkAnswer(2)" id="ans2"></button>

    <button onclick="checkAnswer(3)" id="ans3"></button>

</div>

<div id="resultScreen" style="display:none;">

    <h2 id="finalScore"></h2>

</div>
    
</body>
</html>
<script>

    var questions = ["What is the capital city of France?", "What is the world's most spoken language?", "Who painted the Mona Lisa?"];

    var answers = [
        ["Paris", "Berlin", "Stockholm", "Saint Petersburg"],
        ["German", "Mandarin", "English", "Hindi"],
        ["Pablo Picasso", "Vincent van Gogh", "Leonardo da Vinci", "Michelangelo"]
    ];

    var correctAnswers = [0, 2, 2];

    var score = 0 

    var currentQuestion = 0

    function startQuiz() {

        document.getElementById("startScreen").style.display = "none";

        document.getElementById("quizScreen").style.display = "block";

        nextQuestion();

    }

    function nextQuestion() {

        document.getElementById("question").textContent = questions[currentQuestion];

        for (var i = 0; i <4; i++) {

            document.getElementById("ans" + i).textContent = answers[currentQuestion][i];

        }
    
    }

    function checkAnswer(answer) {

        if (answer === correctAnswers[currentQuestion]) {

            score++;

        }

        currentQuestion++;

        if (currentQuestion < questions.length) {

            nextQuestion();

        }

        else { 
            
            showScore();
        
        }

    }

    function showScore(){

        document.getElementById("quizScreen").style.display = "none";

        document.getElementById("resultScreen").style.display = "block";

        document.getElementById("finalScore").textContent = "You scored a total of " + score + " points!";

    }

</script>
